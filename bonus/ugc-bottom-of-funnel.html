<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IFCA — MOF & BOF Ad Strategy Training</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1E3A5F;
    --navy-dark: #142845;
    --navy-light: #2A4F7F;
    --orange: #E87722;
    --orange-light: #F09040;
    --orange-pale: #FDF3E8;
    --blue-light: #D6E4F0;
    --blue-mid: #A8C8E0;
    --white: #FFFFFF;
    --off-white: #F8FAFC;
    --gray-100: #F1F5F9;
    --gray-200: #E2E8F0;
    --gray-400: #94A3B8;
    --gray-600: #475569;
    --gray-800: #1E293B;
    --text: #1A2840;
    --text-muted: #4A6080;
    --slide-w: 1100px;
    --slide-h: 620px;
    --tof: #3B82F6;
    --mof: #8B5CF6;
    --bof: #E87722;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #0D1B2E;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    gap: 16px;
  }

  /* NAV BAR */
  #nav {
    width: var(--slide-w);
    max-width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
  }
  #nav .logo { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--orange); letter-spacing: 2px; }
  #nav .module-label { font-size: 12px; color: rgba(255,255,255,0.4); letter-spacing: 1px; text-transform: uppercase; }
  #nav .controls { display: flex; align-items: center; gap: 12px; }
  #nav button {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: white; width: 36px; height: 36px; border-radius: 8px;
    font-size: 16px; cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  #nav button:hover { background: rgba(255,255,255,0.15); }
  #nav button:disabled { opacity: 0.3; cursor: default; }
  #slide-counter { font-family: 'DM Mono', monospace; font-size: 13px; color: rgba(255,255,255,0.5); min-width: 60px; text-align: center; }

  /* TOC DOTS */
  #toc-bar { width: var(--slide-w); max-width: 100%; display: flex; gap: 4px; flex-wrap: wrap; }
  .toc-dot { height: 4px; flex: 1; border-radius: 2px; background: rgba(255,255,255,0.15); cursor: pointer; transition: background 0.2s; min-width: 20px; }
  .toc-dot.active { background: var(--orange); }
  .toc-dot:hover { background: rgba(255,255,255,0.4); }

  /* SLIDE STAGE */
  #stage {
    width: var(--slide-w);
    max-width: 100%;
    aspect-ratio: 16/9;
    position: relative;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6);
  }

  .slide {
    position: absolute; inset: 0;
    opacity: 0; pointer-events: none;
    transition: opacity 0.35s ease;
    overflow: hidden;
  }
  .slide.active { opacity: 1; pointer-events: all; }

  /* SPEAKER NOTES */
  #notes-bar {
    width: var(--slide-w);
    max-width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 14px 20px;
    display: none;
  }
  #notes-bar.visible { display: block; }
  #notes-bar .notes-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--orange); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
  #notes-bar .notes-text { font-size: 13px; color: rgba(255,255,255,0.65); line-height: 1.6; }

  /* KEYBOARD HINT */
  .kb-hint { font-size: 11px; color: rgba(255,255,255,0.2); letter-spacing: 0.5px; }

  /* ══════════════════════════════════════════
     SLIDE DESIGN HELPERS
  ══════════════════════════════════════════ */

  /* Base bg */
  .bg-navy { background: var(--navy-dark); }
  .bg-dark { background: #0A1520; }
  .bg-light { background: var(--off-white); }

  .slide-inner {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    padding: 48px 56px;
  }

  .tag {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    padding: 4px 10px; border-radius: 4px;
    margin-bottom: 20px; width: fit-content;
  }
  .tag-orange { background: rgba(232,119,34,0.18); color: var(--orange); border: 1px solid rgba(232,119,34,0.3); }
  .tag-blue { background: rgba(59,130,246,0.15); color: #7EC8E3; border: 1px solid rgba(59,130,246,0.25); }
  .tag-purple { background: rgba(139,92,246,0.15); color: #C4B5FD; border: 1px solid rgba(139,92,246,0.25); }
  .tag-white { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.12); }

  .slide-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(32px, 4.2vw, 52px);
    letter-spacing: 1px;
    line-height: 1.05;
    color: var(--white);
  }
  .slide-title .orange { color: var(--orange); }
  .slide-title .blue { color: var(--blue-mid); }

  .slide-subtitle {
    font-size: 15px; color: rgba(255,255,255,0.5);
    margin-top: 10px; line-height: 1.5;
  }

  .divider {
    height: 2px; background: var(--orange);
    width: 48px; margin: 16px 0; border-radius: 2px;
  }

  /* COLUMNS */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; flex: 1; align-items: start; }
  .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; flex: 1; align-items: start; }

  /* CARD */
  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 20px 22px;
  }
  .card-navy { background: rgba(30,58,95,0.6); border-color: rgba(30,58,95,0.8); }
  .card-orange { background: rgba(232,119,34,0.1); border-color: rgba(232,119,34,0.3); }
  .card-dark { background: rgba(0,0,0,0.3); border-color: rgba(255,255,255,0.08); }

  .card-label {
    font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 10px;
  }
  .card-label.orange { color: var(--orange); }
  .card-label.blue { color: var(--blue-mid); }
  .card-label.purple { color: #C4B5FD; }
  .card-label.green { color: #6EE7B7; }
  .card-label.white { color: rgba(255,255,255,0.4); }

  .card-title { font-size: 16px; font-weight: 600; color: var(--white); margin-bottom: 8px; }
  .card-body { font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.6; }

  /* TABLE */
  .data-table { width: 100%; border-collapse: collapse; }
  .data-table th {
    font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
    color: rgba(255,255,255,0.4); padding: 8px 14px; text-align: left;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .data-table td {
    font-size: 13px; color: rgba(255,255,255,0.75); padding: 11px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.06); vertical-align: top;
  }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: rgba(255,255,255,0.03); }
  .td-highlight { color: var(--white); font-weight: 600; }
  .td-orange { color: var(--orange); font-weight: 600; }
  .td-blue { color: #7EC8E3; font-weight: 600; }
  .td-purple { color: #C4B5FD; font-weight: 600; }
  .td-green { color: #6EE7B7; font-weight: 600; }

  /* PILL / BADGE */
  .pill {
    display: inline-block; padding: 3px 10px; border-radius: 20px;
    font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; letter-spacing: 0.5px;
  }
  .pill-tof { background: rgba(59,130,246,0.2); color: #93C5FD; }
  .pill-mof { background: rgba(139,92,246,0.2); color: #C4B5FD; }
  .pill-bof { background: rgba(232,119,34,0.2); color: var(--orange-light); }

  /* STAT BOX */
  .stat-box {
    background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px; padding: 18px 20px; text-align: center;
  }
  .stat-number { font-family: 'Bebas Neue', sans-serif; font-size: 44px; color: var(--orange); letter-spacing: 1px; line-height: 1; }
  .stat-label { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 4px; line-height: 1.4; }

  /* FUNNEL VISUAL */
  .funnel-stage {
    padding: 14px 20px;
    border-radius: 8px;
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 16px;
  }
  .funnel-tof { background: rgba(59,130,246,0.12); border: 1px solid rgba(59,130,246,0.3); }
  .funnel-mof { background: rgba(139,92,246,0.12); border: 1px solid rgba(139,92,246,0.3); }
  .funnel-bof { background: rgba(232,119,34,0.12); border: 1px solid rgba(232,119,34,0.35); }

  .funnel-icon { font-size: 22px; width: 32px; text-align: center; flex-shrink: 0; }
  .funnel-name { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 2px; }
  .funnel-name.tof-color { color: #93C5FD; }
  .funnel-name.mof-color { color: #C4B5FD; }
  .funnel-name.bof-color { color: var(--orange-light); }
  .funnel-desc { font-size: 13px; color: rgba(255,255,255,0.65); }

  /* CHECKLIST */
  .checklist { list-style: none; display: flex; flex-direction: column; gap: 9px; }
  .checklist li { display: flex; align-items: flex-start; gap: 10px; font-size: 13px; color: rgba(255,255,255,0.7); line-height: 1.5; }
  .check-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }

  /* HIGHLIGHT BOX */
  .highlight-box {
    background: rgba(232,119,34,0.1); border-left: 3px solid var(--orange);
    border-radius: 0 8px 8px 0; padding: 12px 16px;
    font-size: 13px; color: rgba(255,255,255,0.75); line-height: 1.6;
  }
  .highlight-box strong { color: var(--white); }

  .insight-box {
    background: rgba(110,231,183,0.08); border-left: 3px solid #6EE7B7;
    border-radius: 0 8px 8px 0; padding: 12px 16px;
    font-size: 13px; color: rgba(255,255,255,0.75); line-height: 1.6;
  }
  .insight-box strong { color: #6EE7B7; }

  /* STEP ROW */
  .step-row { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 14px; }
  .step-num {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--orange); color: var(--white);
    font-family: 'Bebas Neue', sans-serif; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px;
  }
  .step-content { flex: 1; }
  .step-title { font-size: 14px; font-weight: 600; color: var(--white); margin-bottom: 3px; }
  .step-body { font-size: 12px; color: rgba(255,255,255,0.55); line-height: 1.5; }

  /* ORANGE ACCENT LINE */
  .accent-line { height: 1px; background: linear-gradient(to right, var(--orange), transparent); margin: 14px 0; }

  /* FLOW ARROW */
  .flow-arrow { text-align: center; font-size: 20px; color: rgba(255,255,255,0.25); margin: 4px 0; }

  /* ROAS callout */
  .roas-callout {
    background: linear-gradient(135deg, rgba(110,231,183,0.12), rgba(16,185,129,0.06));
    border: 1px solid rgba(110,231,183,0.3);
    border-radius: 10px; padding: 16px 20px;
  }
  .roas-number { font-family: 'Bebas Neue', sans-serif; font-size: 40px; color: #6EE7B7; line-height: 1; }
  .roas-label { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 2px; }

  /* EXERCISE SLIDE */
  .exercise-bg { background: linear-gradient(135deg, #0A1520 0%, #1a2a0a 100%); }
  .exercise-header {
    background: rgba(110,231,183,0.1); border: 1px solid rgba(110,231,183,0.25);
    border-radius: 8px; padding: 10px 16px; margin-bottom: 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .exercise-header .ex-icon { font-size: 18px; }
  .exercise-header .ex-label { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #6EE7B7; }

  /* SECTION DIVIDER SLIDE */
  .section-divider-bg {
    background: linear-gradient(135deg, #102236 0%, #1E3A5F 60%, #142845 100%);
  }
  .big-section-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 140px; line-height: 1;
    color: rgba(232,119,34,0.12);
    position: absolute; bottom: -10px; right: 40px;
  }

  /* KEYWORD highlight */
  em { font-style: normal; color: var(--orange); font-weight: 600; }
  em.blue { color: var(--blue-mid); }
  em.green { color: #6EE7B7; }
  em.purple { color: #C4B5FD; }

</style>
</head>
<body>

<!-- NAV -->
<nav id="nav">
  <div class="header-logo" style="display:flex;gap:12px;align-items:center;">
    <span class="logo">IFCA</span>
    <span style="width:1px;height:20px;background:rgba(255,255,255,0.15);"></span>
    <span class="module-label">7-Figure Retreat · MOF & BOF Ad Strategy</span>
  </div>
  <div class="controls">
    <button id="btn-notes" title="Toggle speaker notes" style="width:auto;padding:0 12px;font-size:12px;letter-spacing:1px;">NOTES</button>
    <button id="btn-prev" disabled>←</button>
    <span id="slide-counter">1 / 14</span>
    <button id="btn-next">→</button>
  </div>
</nav>

<!-- TOC DOTS -->
<div id="toc-bar"></div>

<!-- STAGE -->
<div id="stage"></div>

<!-- SPEAKER NOTES -->
<div id="notes-bar">
  <div class="notes-label">Speaker Notes</div>
  <div id="notes-text" class="notes-text"></div>
</div>

<p class="kb-hint">← → arrow keys to navigate &nbsp;·&nbsp; N to toggle notes</p>

<script>
const slides = [

  // ─── SLIDE 1 — TITLE ─────────────────────────────────────────────────────
  {
    notes: "Set the frame before diving in. Most people in this room have been running TOF-only. That's how you get to $100K/year. It's not how you get to $250K+ or $500K+. This module is about the other 30-40% of your ad budget that you're currently leaving on the table.",
    html: `
    <div class="slide-inner section-divider-bg" style="justify-content:center;">
      <div class="tag tag-orange">Module — Ad Funnel Strategy</div>
      <div class="slide-title" style="font-size:clamp(38px,5vw,64px);">Middle &amp; Bottom<br><span class="orange">of Funnel Ads</span></div>
      <div class="divider"></div>
      <div class="slide-subtitle" style="max-width:580px;font-size:16px;">How to build the full acquisition funnel — so you're not just generating leads, you're closing the ones you already have.</div>
      <div style="margin-top:auto;display:flex;gap:12px;align-items:center;">
        <span class="pill pill-tof">TOF · Cold</span>
        <span style="color:rgba(255,255,255,0.2);font-size:18px;">→</span>
        <span class="pill pill-mof">MOF · Warm</span>
        <span style="color:rgba(255,255,255,0.2);font-size:18px;">→</span>
        <span class="pill pill-bof">BOF · Ready to Buy</span>
      </div>
      <div class="big-section-num">MOF<br>BOF</div>
    </div>`
  },

  // ─── SLIDE 2 — THE PROBLEM ────────────────────────────────────────────────
  {
    notes: "This is the pattern I see repeatedly across the retreat group. You've been TOF-only because it works early. But at a certain point you've extracted most of the addressable cold traffic that will respond to your lead magnet format. More budget on a saturated TOF just produces diminishing returns. The pipeline breaks downstream — not at the ad level.",
    html: `
    <div class="slide-inner bg-dark">
      <div class="tag tag-white">The Problem</div>
      <div class="slide-title">Why Your <span class="orange">TOF-Only</span> Strategy<br>Has a Ceiling</div>
      <div class="divider"></div>
      <div class="two-col" style="margin-top:4px;">
        <div>
          <div class="card card-dark" style="border-color:rgba(239,68,68,0.25);background:rgba(239,68,68,0.07);">
            <div class="card-label" style="color:#FCA5A5;">What Most People Are Running</div>
            <div class="card-title" style="color:#FCA5A5;">TOF Only — DM Lead Magnet</div>
            <div class="card-body" style="margin-top:8px;">
              <div style="display:flex;flex-direction:column;gap:7px;margin-top:8px;">
                <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:rgba(255,255,255,0.6);">
                  <span style="color:#FCA5A5;">✕</span> Cold traffic → DM → Manual follow-up → Call
                </div>
                <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:rgba(255,255,255,0.6);">
                  <span style="color:#FCA5A5;">✕</span> 100% of budget on one funnel format
                </div>
                <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:rgba(255,255,255,0.6);">
                  <span style="color:#FCA5A5;">✕</span> Warm followers leaking — no retargeting
                </div>
                <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:rgba(255,255,255,0.6);">
                  <span style="color:#FCA5A5;">✕</span> Leads from last 6 months: never followed up on with ads
                </div>
                <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:rgba(255,255,255,0.6);">
                  <span style="color:#FCA5A5;">✕</span> Call-ready prospects seeing same cold-traffic ad as strangers
                </div>
              </div>
            </div>
          </div>
          <div class="highlight-box" style="margin-top:14px;">
            <strong>The Ceiling:</strong> Once you've extracted most addressable cold traffic with one format, more spend ≠ more calls. The answer isn't louder TOF — it's layering MOF and BOF.
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:12px;">
          <div class="stat-box">
            <div class="stat-number">60–70<span style="font-size:28px;">%</span></div>
            <div class="stat-label">Budget allocation you're currently spending on TOF<br>when you should be splitting it across all 3 layers</div>
          </div>
          <div class="card card-dark">
            <div class="card-label orange">What You're Missing</div>
            <ul class="checklist" style="margin-top:4px;">
              <li><span class="check-icon">💜</span>Warm followers who never became leads</li>
              <li><span class="check-icon">📋</span>Leads who opted in but never booked a call</li>
              <li><span class="check-icon">🎯</span>Call-ready prospects who need one direct CTA</li>
              <li><span class="check-icon">🔁</span>Past inquiries who need re-engagement</li>
            </ul>
          </div>
        </div>
      </div>
    </div>`
  },

  // ─── SLIDE 3 — 3-LAYER FUNNEL OVERVIEW ────────────────────────────────────
  {
    notes: "This is the full framework. Think of your ad account as three separate jobs running simultaneously. TOF fills the pipeline. MOF moves people from aware to interested. BOF converts the already-interested into booked calls and signed clients. Each layer talks to a different temperature of prospect — different message, different CTA, different success metric.",
    html: `
    <div class="slide-inner bg-navy">
      <div class="tag tag-orange">Framework</div>
      <div class="slide-title">The <span class="orange">3-Layer</span> Acquisition Funnel</div>
      <div class="divider"></div>
      <div style="flex:1;display:flex;flex-direction:column;gap:0;justify-content:center;">

        <div class="funnel-stage funnel-tof">
          <div class="funnel-icon">🌊</div>
          <div style="flex:1;">
            <div class="funnel-name tof-color">TOF — Cold Traffic &nbsp;<span class="pill pill-tof">60–70% of Budget</span></div>
            <div class="funnel-desc">Goal: New followers + DM leads &nbsp;·&nbsp; Ads: DM automation, follower campaign, educational content &nbsp;·&nbsp; Audience: Broad cold / interest-stacked</div>
          </div>
        </div>

        <div class="flow-arrow">↓</div>

        <div class="funnel-stage funnel-mof">
          <div class="funnel-icon">🔥</div>
          <div style="flex:1;">
            <div class="funnel-name mof-color">MOF — Warm Retargeting &nbsp;<span class="pill pill-mof">15–20% of Budget</span></div>
            <div class="funnel-desc">Goal: Move warm prospects onto email/SMS list + closer to call &nbsp;·&nbsp; Ads: Lead magnet (50/50 cold + retarget), social proof, value content &nbsp;·&nbsp; Audience: Followers, video viewers, website visitors</div>
          </div>
        </div>

        <div class="flow-arrow">↓</div>

        <div class="funnel-stage funnel-bof">
          <div class="funnel-icon">💰</div>
          <div style="flex:1;">
            <div class="funnel-name bof-color">BOF — Ready to Buy &nbsp;<span class="pill pill-bof">15–20% of Budget</span></div>
            <div class="funnel-desc">Goal: Convert call-ready prospects &nbsp;·&nbsp; Ads: Short-form VSL, IG DM keyword CTA, direct application CTA &nbsp;·&nbsp; Audience: Past leads, engaged followers, email list, past inquiries</div>
          </div>
        </div>

      </div>
      <div class="insight-box" style="margin-top:12px;">
        <strong>Key Principle:</strong> Each layer speaks to a different level of awareness. TOF educates. MOF nurtures. BOF converts. Running the same ad to all three is leaving money on the table every single day.
      </div>
    </div>`
  },

// ══════════════════════════════════════════
// ENGINE
// ══════════════════════════════════════════
let current = 0;
let notesVisible = false;

const stage = document.getElementById('stage');
const tocBar = document.getElementById('toc-bar');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');
const counter = document.getElementById('slide-counter');
const notesBar = document.getElementById('notes-bar');
const notesText = document.getElementById('notes-text');

// Build slides
slides.forEach((s, i) => {
  const el = document.createElement('div');
  el.className = 'slide bg-navy';
  el.innerHTML = s.html;
  if (i === 0) el.classList.add('active');
  stage.appendChild(el);
});

// Build TOC dots
slides.forEach((_, i) => {
  const dot = document.createElement('div');
  dot.className = 'toc-dot' + (i === 0 ? ' active' : '');
  dot.addEventListener('click', () => goTo(i));
  tocBar.appendChild(dot);
});

function goTo(n) {
  const els = stage.querySelectorAll('.slide');
  const dots = tocBar.querySelectorAll('.toc-dot');
  els[current].classList.remove('active');
  dots[current].classList.remove('active');
  current = n;
  els[current].classList.add('active');
  dots[current].classList.add('active');
  btnPrev.disabled = current === 0;
  btnNext.disabled = current === slides.length - 1;
  counter.textContent = `${current + 1} / ${slides.length}`;
  if (notesVisible) notesText.textContent = slides[current].notes;
}

btnPrev.addEventListener('click', () => { if (current > 0) goTo(current - 1); });
btnNext.addEventListener('click', () => { if (current < slides.length - 1) goTo(current + 1); });

document.getElementById('btn-notes').addEventListener('click', () => {
  notesVisible = !notesVisible;
  notesBar.classList.toggle('visible', notesVisible);
  if (notesVisible) notesText.textContent = slides[current].notes;
});

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { if (current < slides.length - 1) goTo(current + 1); }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { if (current > 0) goTo(current - 1); }
  if (e.key === 'n' || e.key === 'N') document.getElementById('btn-notes').click();
});
</script>
