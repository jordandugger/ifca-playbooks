<!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IFCA Playbooks</title>
    <style>
      * {
        margin: 0;
      padding: 0;
      box-sizing: border-box;
}
    body {
            font-family: Georgia, serif;
      background-color: #1E3A5F;
      color: #ffffff;
            display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
}
    h1 {
            font-size: 2.5rem;
      color: #E87722;
            margin-bottom: 1rem;
      letter-spacing: 0.05em;
}
    p {
            font-size: 1.1rem;
      color: #ccd9e8;
            margin-bottom: 2rem;
}
    .links {
            display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .links span {
            background-color: #E87722;
      color: #1E3A5F;
      padding: 0.5rem 1.2rem;
      border-radius: 4px;
      font-weight: bold;
      font-size: 0.95rem;
}
  </style>
    </head>
    <body>
      <h1>IFCA Playbooks</h1>
      <p>Seven-Figure Workshop Series</p>
  <p>Coming soon:</p>
  <div class="links">
        <span>7F Workshops</span>
        <span>AI Tools</span>
        <span>Calculators</span>
        <span>Resources</span>
      </div>
    </body>
    </html>
